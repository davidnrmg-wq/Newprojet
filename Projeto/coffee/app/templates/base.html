{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Produção de Café{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        nav { margin-bottom: 20px; padding: 10px; background: #f4f4f4; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; font-weight: bold; }
        nav a:hover { color: #007bff; }
        .container { max-width: 800px; margin: auto; }
        .btn-logout { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{% url 'index' %}">Início</a>
            <a href="{% url 'historico' %}">Histórico</a>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">Sair</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Entrar</a>
            {% endif %}
        </nav>

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
