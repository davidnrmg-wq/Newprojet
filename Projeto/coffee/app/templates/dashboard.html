{% extends 'base.html' %}

{% block title %}Dashboard - Produção de Café{% endblock %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h1>Dashboard Geral</h1>

<div style="display: flex; gap: 20px; margin-bottom: 30px;">
    <div style="flex: 1; padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center; border: 1px solid #dee2e6;">
        <h3>Total de Registros</h3>
        <p style="font-size: 24px; font-weight: bold; color: #007bff;">{{ total_registros }}</p>
    </div>
    <div style="flex: 1; padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center; border: 1px solid #dee2e6;">
        <h3>Produção Acumulada</h3>
        <p style="font-size: 24px; font-weight: bold; color: #28a745;">{{ soma_total|floatformat:2 }} kg</p>
    </div>
</div>

<canvas id="grafico" width="400" height="150"></canvas>

<script>
const labels = JSON.parse('{{ labels|safe }}');
const data = JSON.parse('{{ totais|safe }}');

new Chart(document.getElementById('grafico'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Evolução da Produção (kg)',
            data: data,
            fill: true,
            backgroundColor: 'rgba(40, 167, 69, 0.1)',
            borderColor: 'rgba(40, 167, 69, 1)',
            tension: 0.1
        }]
    },
    options: {
        scales: {
            y: { beginAtZero: true }
        }
    }
});
</script>
{% endblock %}
