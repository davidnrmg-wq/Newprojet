{% extends 'base.html' %}

{% block title %}Calculadora - Produção de Café{% endblock %}

{% block content %}
<h1>Calculadora de Produção</h1>

<form method="POST">
    {% csrf_token %}

    <label for="produtor_id">Produtor:</label><br>
    <select name="produtor_id" id="produtor_id" required>
        <option value="">Selecione um Produtor</option>
        {% for p in produtores %}
            <option value="{{ p.id }}">{{ p.nome }}</option>
        {% endfor %}
    </select><br><br>

    <label for="terreno">Tamanho do Terreno (ha):</label><br>
    <input type="number" step="0.01" name="terreno" id="terreno" placeholder="Ex: 10.5" required><br><br>

    <label for="pes">Quantidade de Pés:</label><br>
    <input type="number" name="pes" id="pes" placeholder="Ex: 5000" required><br><br>

    <label for="producao">Produção por Pé (kg):</label><br>
    <input type="text" name="producao" id="producao" placeholder="Ex: 2,5" required><br><br>

    <button type="submit">Calcular e Salvar</button>
</form>

{% if resultado %}
<div style="margin-top: 20px; padding: 15px; background: #e2f3f5; border: 1px solid #3d5af1;">
    <h2>Resultado: {{ resultado|floatformat:2 }} kg</h2>
</div>
{% endif %}
{% endblock %}
