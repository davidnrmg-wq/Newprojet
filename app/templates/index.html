{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Produção de Café</title>
</head>
<body>

<h1>Calculadora de Produção</h1>

<form method="POST">
    {% csrf_token %}

    <select name="produtor_id" required>
        <option value="">Selecione um Produtor</option>
        {% for p in produtores %}
            <option value="{{ p.id }}">{{ p.nome }}</option>
        {% endfor %}
    </select><br><br>

    <input type="number" name="terreno" placeholder="Terreno" required><br><br>

    <input type="number" name="pes" placeholder="Quantidade de pés"><br><br>

    <input type="text" name="producao" placeholder="Produção por pé"><br><br>

    <button type="submit">Calcular</button>
</form>

{% if resultado %}
<h2>Resultado: {{ resultado }} kg</h2>
{% endif %}

<br>

<a href="/historico/">Ver Histórico</a>

</body>
</html>
