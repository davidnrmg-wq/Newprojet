{% extends 'base.html' %}

{% block title %}Login - Produção de Café{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px; background: #fff;">
    <h2 style="text-align: center; margin-bottom: 20px;">Acessar Sistema</h2>

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            {{ form.as_p }}
        </div>
        <button type="submit" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
