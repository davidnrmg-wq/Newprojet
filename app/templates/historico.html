{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Histórico</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Histórico de Produção</h1>

<canvas id="grafico" width="400" height="150"></canvas>

<table border="1">

<tr>
    <th>Terreno</th>
    <th>Pés</th>
    <th>Produção</th>
    <th>Total</th>
</tr>

{% for dado in dados %}
<tr>
    <td>{{ dado.terreno }}</td>
    <td>{{ dado.pes }}</td>
    <td>{{ dado.producao_por_pe }}</td>
    <td>{{ dado.total }}</td>
</tr>
{% endfor %}

</table>

<script>
const labels = JSON.parse('{{ labels|safe }}');
const data = JSON.parse('{{ totais|safe }}');

new Chart(document.getElementById('grafico'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Produção',
            data: data
        }]
    }
});
</script>

</body>
</html>
